[alembic]
script_location = alembic
# Override with DATABASE_URL env var. Alembic needs the sync driver (psycopg2).
# Example: postgresql+psycopg2://user:pass@your-vm-host:5432/your_db
sqlalchemy.url = postgresql+psycopg2://qesflow:qesflow_dev@localhost:5432/qesflow

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
