# QES Flow — Local Development Environment
#
# Usage:
#   docker compose up -d                     # Start API + MinIO (uses external Postgres from .env)
#   docker compose --profile localdb up -d   # Also start a local Postgres container
#   docker compose logs -f api               # Follow API logs
#   docker compose exec api alembic upgrade head  # Run migrations (if using localdb profile)
#   docker compose down -v                   # Stop and remove volumes
#
# Services (default):
#   api           — FastAPI backend (port 8000) — connects to external DB from .env
#   minio         — S3-compatible storage (port 9000, console 9001)
#   createbuckets — One-shot: creates required MinIO buckets
#
# Optional (--profile localdb):
#   db            — PostgreSQL 16 (port 5432) — use instead of external VM DB

services:
  # ── Optional local PostgreSQL (use --profile localdb) ────────────────
  db:
    profiles: ["localdb"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: qesflow
      POSTGRES_USER: qesflow
      POSTGRES_PASSWORD: qesflow_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qesflow"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── MinIO (S3-compatible storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Create MinIO buckets on first start ──────────────────────────────
  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123;
      mc mb --ignore-existing --with-lock local/qesflow-prescriptions;
      mc mb --ignore-existing --with-lock local/qesflow-evidence;
      mc mb --ignore-existing --with-lock local/qesflow-audit-exports;
      echo 'Buckets created with Object Lock enabled';
      "

  # ── Backend API ──────────────────────────────────────────────────────
  api:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env                          # Load DATABASE_URL, keys, QTSP config, etc.
    environment:
      # Override dev/Docker-specific values (take precedence over .env)
      APP_ENV: development
      APP_DEBUG: "true"
      APP_ALLOWED_HOSTS: "localhost,127.0.0.1"
      APP_CORS_ORIGINS: "http://localhost:3000,http://localhost:3001,http://localhost:3002"
      LOG_LEVEL: DEBUG
      LOG_FORMAT: console
      # S3: point to the minio container (overrides empty values in .env)
      S3_ENDPOINT_URL: "http://minio:9000"
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin123
      S3_USE_SSL: "false"
      S3_PRESCRIPTION_BUCKET: qesflow-prescriptions
      S3_EVIDENCE_BUCKET: qesflow-evidence
      S3_AUDIT_EXPORT_BUCKET: qesflow-audit-exports
    volumes:
      - ./src/backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  pgdata:
  miniodata:
